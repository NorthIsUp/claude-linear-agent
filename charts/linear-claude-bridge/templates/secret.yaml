{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "linear-claude-bridge.fullname" . }}
  labels:
    {{- include "linear-claude-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  LINEAR_CLIENT_ID: {{ required "secrets.linearClientId is required when no existingSecret is set" .Values.secrets.linearClientId | quote }}
  LINEAR_CLIENT_SECRET: {{ required "secrets.linearClientSecret is required when no existingSecret is set" .Values.secrets.linearClientSecret | quote }}
  LINEAR_WEBHOOK_SECRET: {{ required "secrets.linearWebhookSecret is required when no existingSecret is set" .Values.secrets.linearWebhookSecret | quote }}
  ANTHROPIC_API_KEY: {{ required "secrets.anthropicApiKey is required when no existingSecret is set" .Values.secrets.anthropicApiKey | quote }}
  CLAUDE_AGENT_ID: {{ required "claude.agentId is required" .Values.claude.agentId | quote }}
  CLAUDE_ENVIRONMENT_ID: {{ required "claude.environmentId is required" .Values.claude.environmentId | quote }}
{{- end -}}
