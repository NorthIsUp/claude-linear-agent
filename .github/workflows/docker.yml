name: docker

# Build and push the linear-claude-bridge container image to GitHub
# Container Registry (ghcr.io). Tags follow the conventions emitted by
# docker/metadata-action: `latest` on default branch, `sha-<short>` for
# every build, and the version on `v*` tags. Pull requests build only
# (no push) so the Dockerfile stays verified without polluting ghcr.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "src/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "src/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch: {}

# Only the image push needs concurrency control. Cancel superseded
# pushes on the same ref so a fast-follow commit doesn't waste a build.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/linear-claude-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU + buildx make multi-arch (amd64 + arm64) builds possible on a
      # single ubuntu-latest runner. Worth the ~30s overhead because most
      # managed-Kubernetes node pools are arm64-capable now.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skip ghcr login on PR builds — they don't push, and pull_request
      # runs from a fork have no GITHUB_TOKEN with packages:write.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag conventions:
          #   - `latest` on the default branch (main)
          #   - `sha-<7chars>` on every build (immutable, ideal for Helm pins)
          #   - the SemVer pieces on a `v*` git tag
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache backend keeps layer reuse across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
