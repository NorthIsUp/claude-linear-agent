name: release

# Triggered when the version in package.json changes on main. Tags the
# commit `v<version>`, creates a GitHub Release with auto-generated
# notes, and lets the existing docker.yml workflow pick up the tag and
# publish image tags `<major>.<minor>` and `<major>.<minor>.<patch>` to
# ghcr.
#
# Lockstep guard: refuses to tag if package.json version disagrees with
# charts/linear-claude-bridge/Chart.yaml's appVersion. Bump both in the
# same commit to release.

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch: {}

# Tags are global, so two concurrent release runs would race on the
# same v* ref. Serialize, but never cancel an in-flight release.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git ls-remote` and `gh release` can resolve
          # prior tags and generate change notes against the last release.
          fetch-depth: 0

      - name: Resolve target version
        id: version
        run: |
          set -euo pipefail
          version=$(jq -r .version package.json)
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::package.json is missing .version"
            exit 1
          fi
          chart=$(awk '/^appVersion:/ {gsub(/[" ]/, "", $2); print $2}' charts/linear-claude-bridge/Chart.yaml)
          if [[ "$version" != "$chart" ]]; then
            echo "::error::package.json version ($version) != Chart.yaml appVersion ($chart). Bump both files in the same commit before releasing."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"     >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — assuming this version was released previously."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.tag_exists.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify build before tagging
        # Cheap guard: don't tag a release that doesn't compile. Faster
        # than waiting for the docker.yml tag-trigger build to fail.
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          npm ci
          npm run build

      - name: Create tag and GitHub Release
        if: steps.tag_exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
